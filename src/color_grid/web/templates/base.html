<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Color Grid</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Color Grid</h1>
        <p class="subtitle">Generate color-by-number pages from photographs</p>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
    window.imageAspect = 1;
    function clampGrid(v) { return Math.max(12, Math.min(72, Math.round(v))); }
    function onWidthChange(v) {
        v = parseInt(v);
        document.getElementById('width-val').textContent = v;
        if (document.getElementById('lock-aspect').checked && window.imageAspect) {
            var h = clampGrid(v / window.imageAspect);
            document.getElementById('height').value = h;
            document.getElementById('height-val').textContent = h;
        }
    }
    function onHeightChange(v) {
        v = parseInt(v);
        document.getElementById('height-val').textContent = v;
        if (document.getElementById('lock-aspect').checked && window.imageAspect) {
            var w = clampGrid(v * window.imageAspect);
            document.getElementById('width').value = w;
            document.getElementById('width-val').textContent = w;
        }
    }
    </script>
    {% if app_version %}
    <footer>Color Grid {{ app_version }}</footer>
    {% endif %}
</body>
</html>
