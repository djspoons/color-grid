<p class="status-msg">Image loaded ({{ width }} pixels &times; {{ height }} pixels).</p>

<script>
document.getElementById('options-fields').disabled = false;
window.imageAspect = {{ width }} / {{ height }};
if (document.getElementById('lock-aspect').checked) {
    var w = parseInt(document.getElementById('width').value);
    var h = Math.round(w / window.imageAspect);
    h = Math.max(12, Math.min(72, h));
    document.getElementById('height').value = h;
    document.getElementById('height-val').textContent = h;
}
</script>
