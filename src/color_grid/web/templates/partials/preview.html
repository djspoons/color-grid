<div class="preview-panels">
    <div class="preview-panel">
        <h2>Grid</h2>
        <div class="svg-container">
            {{ grid_svg | safe }}
        </div>
    </div>
    <div class="preview-panel">
        <h2>Solution</h2>
        <div class="svg-container">
            {{ solution_svg | safe }}
        </div>
    </div>
</div>

<div id="status" hx-swap-oob="true">
    <p class="status-msg">Preview generated.</p>
</div>

<div class="step-body" id="download-area" hx-swap-oob="true">
    <div class="download-links">
        <a href="/download/grid.pdf" class="btn">Download Grid PDF</a>
        <a href="/download/solution.pdf" class="btn">Download Solution PDF</a>
    </div>
</div>
